services:
  db:
    image: postgres:16-alpine
    container_name: taskmanager_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-taskmanager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Host 5433 avoids clash with a local Windows PostgreSQL install on 5432
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-taskmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskmanager_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Load Google OAuth + JWT from server/.env (not baked into the image)
    env_file:
      - ./server/.env
    environment:
      # Overrides env_file so the container talks to Compose Postgres, not localhost:5433
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-taskmanager}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
